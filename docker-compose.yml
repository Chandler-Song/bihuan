name: bihuan

services:
  redis:
    image: redis:7-alpine
    container_name: bihuan-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - bihuan-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: bihuan-backend
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - bihuan-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: bihuan-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "9090:80"

volumes:
  bihuan-data:
  bihuan-redis:
