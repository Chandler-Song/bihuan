server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 安全头
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header Referrer-Policy strict-origin-when-cross-origin;

  # gzip
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
  gzip_vary on;

  client_max_body_size 4m;

  # API 反代到 backend 容器
  location /api/ {
    proxy_pass         http://backend:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location = /health {
    proxy_pass http://backend:3001/health;
  }

  # PWA & 静态资源缓存
  location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # service worker / manifest 不缓存
  location = /sw.js              { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location = /registerSW.js      { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
